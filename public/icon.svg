<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background with rounded corners -->
  <rect width="512" height="512" rx="104" fill="#f1f1f1"/>

  <!--
    Fuel gauge: center (256,380), outer r=190, inner r=140.
    Clockwise arc (sweep=1) from 180° to 0° through the top.
    Segments with 5-6° gaps:
      Blue   180°→234°
      Amber  240°→282°
      Orange 287°→327°
      Red    332°→358°
  -->

  <!-- Blue segment -->
  <path d="M 66 380 A 190 190 0 0 1 147 224 L 176 265 A 140 140 0 0 0 116 380 Z" fill="#3b82f6"/>

  <!-- Amber segment -->
  <path d="M 164 214 A 190 190 0 0 1 296 194 L 285 243 A 140 140 0 0 0 188 258 Z" fill="#f59e0b"/>

  <!-- Orange segment -->
  <path d="M 312 198 A 190 190 0 0 1 415 275 L 373 303 A 140 140 0 0 0 297 246 Z" fill="#f97316"/>

  <!-- Red segment -->
  <path d="M 423 289 A 190 190 0 0 1 446 374 L 396 375 A 140 140 0 0 0 379 313 Z" fill="#ef4444"/>

  <!-- E label -->
  <text x="68" y="456" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700" fill="#22c55e" text-anchor="middle">E</text>

  <!-- F label -->
  <text x="444" y="456" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700" fill="#ef4444" text-anchor="middle">F</text>

  <!--
    Spoon needle pointing at ~320° (orange→red boundary, "nearly full").
    rotate(50) moves local "up" to screen angle 270+50=320°.
  -->
  <g transform="translate(256, 380) rotate(50)">
    <rect x="-6" y="-125" width="12" height="172" rx="6" fill="#374151"/>
    <ellipse cx="0" cy="-148" rx="22" ry="28" fill="#374151"/>
    <circle cx="0" cy="0" r="16" fill="#4b5563"/>
    <circle cx="0" cy="0" r="7" fill="#9ca3af"/>
  </g>
</svg>
